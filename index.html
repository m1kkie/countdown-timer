<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Countdown Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        #timer {
            font-size: 48px;
            font-weight: bold;
        }
        #emoji {
            font-size: 200px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<h1>Countdown to Mickey's holiday</h1>
<div id="timer">Laden...</div>

<!-- 😎 Emoji onderaan -->
<div id="emoji">😎</div>

<script>
    // 🔧 Stel hier je eindtijd in
    const eindTijd = new Date("2026-04-15T17:00:00").getTime();

    const timer = setInterval(function() {
        const nu = new Date().getTime();
        const verschil = eindTijd - nu;

        if (verschil <= 0) {
            clearInterval(timer);
            document.getElementById("timer").innerHTML = "Tijd bereikt!";
            return;
        }

        const dagen = Math.floor(verschil / (1000 * 60 * 60 * 24));
        const uren = Math.floor((verschil % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minuten = Math.floor((verschil % (1000 * 60 * 60)) / (1000 * 60));
        const seconden = Math.floor((verschil % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML =
            dagen + "d " + uren + "u " + minuten + "m " + seconden + "s ";
    }, 1000);
</script>

</body>
</html>
